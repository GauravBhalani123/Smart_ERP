databases:
  - name: erp-db
    plan: free

services:
  - type: web
    name: erp-saas-unified
    env: node
    plan: free
    buildCommand: |
      npm install --prefix frontend
      npm run build --prefix frontend
      cd backend
      npm install
      rm -rf prisma/migrations
      npx prisma generate
      npx prisma db push --accept-data-loss
      npx prisma db seed
    startCommand: cd backend && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: erp-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: OPENROUTER_API_KEY
        sync: false
      - key: OPENROUTER_MODEL
        value: openai/gpt-4o-mini
      - key: WHISPER_API_KEY
        sync: false
      - key: WHISPER_API_URL
        value: https://api.openai.com/v1/audio/transcriptions
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASS
        sync: false
