databases:
  - name: erp-db
    plan: free

services:
  - type: web
    name: erp-saas-backend
    env: node
    plan: free
    rootDir: backend
    buildCommand: npm install && npm run prisma:generate && npm run prisma:deploy && npm run prisma:seed
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: erp-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: CLIENT_ORIGIN
        fromService:
          type: static
          name: erp-saas-frontend
          property: host
      - key: OPENROUTER_API_KEY
        sync: false
      - key: OPENROUTER_MODEL
        value: openai/gpt-4o-mini
      - key: WHISPER_API_KEY
        sync: false
      - key: WHISPER_API_URL
        value: https://api.openai.com/v1/audio/transcriptions
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASS
        sync: false

  - type: static
    name: erp-saas-frontend
    rootDir: frontend
    buildCommand: npm install && npm run build
    publishDir: dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: erp-saas-backend
          property: host
